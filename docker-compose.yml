services:
  postgres:
    image: postgres:16-alpine
    container_name: financial-tracker-postgres
    environment:
      POSTGRES_DB: financial_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial_tracker"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: financial-tracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: financial-tracker-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/financial_tracker?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: replace-me
      TOKEN_ENCRYPTION_KEY: replace-me-with-32-byte-key
    ports:
      - "3000:3000"
    command: sh -c "npm run prisma:migrate:deploy --workspace @financial-tracker/api && npm run start --workspace @financial-tracker/api"

volumes:
  postgres_data:
  redis_data:
